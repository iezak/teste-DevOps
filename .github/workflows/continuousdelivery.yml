name: Continous delivery
on:
    push: 
        branches: 
            - main

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
            name: projetozipado.zip
            path: |
              '**.py'
              README.md


          



